name: Build iOS IPA (Capacitor)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 配置npm国内镜像
        run: npm config set registry https://registry.npmmirror.com

      - name: 安装项目依赖
        run: npm install --legacy-peer-deps

      - name: 统一 Capacitor 全家桶到 7.x 版本
        run: npm install @capacitor/ios@7 @capacitor/filesystem@7 --legacy-peer-deps

      - name: 构建前端代码
        run: npx vite build

      - name: 添加 iOS 平台
        run: npx cap add ios

      - name: 同步资源到原生工程
        run: npx cap sync ios

      - name: 编译生成归档文件
        run: |
          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: 手动打包生成无签名 IPA
        run: |
          mkdir -p build/ipa-output/Payload
          cp -R build/App.xcarchive/Products/Applications/App.app build/ipa-output/Payload/
          cd build/ipa-output
          zip -qry App.ipa Payload

      - name: 上传 IPA 安装包
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ipa-output/App.ipa